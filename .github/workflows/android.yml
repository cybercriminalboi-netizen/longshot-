name: Android CI (Generate and Release APK)

on:
  push:
    branches: [ "**" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "**" ]

# Permissions required to create a draft/release and upload assets on GitHub
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew

    - name: Setup Gradle Environment
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Rename and Prepare APK for Artifact Upload
      run: |
        mkdir -p build-outputs
        cp app/build/outputs/apk/debug/app-debug.apk build-outputs/Longshot-Debug.apk

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Longshot-Debug-APK
        path: build-outputs/Longshot-Debug.apk

    - name: Create GitHub Release and Upload APK
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: build-outputs/Longshot-Debug.apk
        draft: false
        prerelease: false
        name: Release ${{ github.ref_name }}
        body: |
          Automatic APK Release for Longshot App.
          
          ### Installation
          Download the **Longshot-Debug.apk** from the attachments below and install it directly on your Android device.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
